name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set base path for main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "NEXT_PUBLIC_BASE_PATH=/guitar-harmony" >> $GITHUB_ENV

      - name: Set base path for PR preview
        if: github.event_name == 'pull_request'
        run: echo "NEXT_PUBLIC_BASE_PATH=/guitar-harmony/pr-preview/pr-${{ github.event.number }}" >> $GITHUB_ENV

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          keep_files: true

      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./out
